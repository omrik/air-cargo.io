name: Sync OpenAPI Spec

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch OpenAPI spec
        run: |
          curl -s https://www.air-cargo.io/openapi.json \
            -o site/api/openapi.json \
            || echo "Direct fetch failed, trying alternate path"
          curl -s https://www.air-cargo.io/api/openapi.json \
            -o site/api/openapi.json \
            || echo "Alternate fetch also failed"
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet site/api/openapi.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "openapi-sync[bot]"
          git config user.email "openapi-sync@air-cargo.io"
          git add site/api/openapi.json
          git commit -m "chore: sync OpenAPI spec from production"
          git push
